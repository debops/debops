- name: Manage Docker Compose services
  collections: [ 'debops.debops', 'debops.roles01',
                 'debops.roles02', 'debops.roles03' ]
  hosts: [ 'debops_service_docker_compose_service' ]
  become: True

  environment: '{{ inventory__environment | d({})
                   | combine(inventory__group_environment | d({}))
                   | combine(inventory__host_environment  | d({})) }}'

  pre_tasks:

    - name: Define variables used by Ansible roles
      ansible.builtin.import_role:
        name: 'secret'
      tags: [ 'role::secret', 'role::docker_compose_service' ]

    - name: Build docker_compose_service nginx configuration
      ansible.builtin.import_role:
        name: 'docker_compose_service'
        tasks_from: 'build_nginx_vars'
      tags: [ 'role::docker_compose_service', 'skip::docker_compose_service',
              'role::nginx', 'skip::nginx' ]

    - name: Build docker_compose_service ferm configuration
      ansible.builtin.import_role:
        name: 'docker_compose_service'
        tasks_from: 'build_ferm_vars'
      tags: [ 'role::docker_compose_service', 'skip::docker_compose_service',
              'role::ferm', 'skip::ferm' ]

  roles:

    - role: keyring
      tags: [ 'role::keyring', 'skip::keyring' ]
      keyring__dependent_gpg_keys:
        - '{{ nginx__keyring__dependent_apt_keys }}'
      when: docker_compose_service__nginx__dependent_servers | d([]) | length > 0

    - role: apt_preferences
      tags: [ 'role::apt_preferences', 'skip::apt_preferences' ]
      apt_preferences__dependent_list:
        - '{{ nginx__apt_preferences__dependent_list }}'
      when: docker_compose_service__nginx__dependent_servers | d([]) | length > 0

    - role: ferm
      tags: [ 'role::ferm', 'skip::ferm' ]
      ferm__dependent_rules:
        - '{{ nginx__ferm__dependent_rules
              if (docker_compose_service__nginx__dependent_servers | d([]) | length > 0)
              else [] }}'
        - '{{ docker_compose_service__ferm__dependent_rules | d([]) }}'
      when: (docker_compose_service__nginx__dependent_servers | d([]) | length > 0)
            or (docker_compose_service__ferm__dependent_rules | d([]) | length > 0)

    - role: python
      tags: [ 'role::python', 'skip::python' ]
      python__dependent_packages3:
        - '{{ docker_compose_service__python__dependent_packages3 }}'
        - '{{ nginx__python__dependent_packages3
              if (docker_compose_service__nginx__dependent_servers | d([]) | length > 0)
              else [] }}'
      python__dependent_packages2:
        - '{{ nginx__python__dependent_packages2
              if (docker_compose_service__nginx__dependent_servers | d([]) | length > 0)
              else [] }}'

    - role: nginx
      tags: [ 'role::nginx', 'skip::nginx' ]
      nginx__dependent_servers:
        - '{{ docker_compose_service__nginx__dependent_servers }}'
      nginx__dependent_upstreams:
        - '{{ docker_compose_service__nginx__dependent_upstreams }}'
      when: docker_compose_service__nginx__dependent_servers | d([]) | length > 0

    - role: docker_compose_service
      tags: [ 'role::docker_compose_service', 'skip::docker_compose_service' ]
