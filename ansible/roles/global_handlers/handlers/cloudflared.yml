- name: Restart cloudflared tunnels
  ansible.builtin.systemd:
    name: 'cloudflared@{{ item.name }}.service'
    state: 'restarted'
  loop: '{{ cloudflared__combined_tunnels }}'
  loop_control:
    label: '{{ item.name }}'
  when: cloudflared__enabled | d(False) | bool and
        item.state | d('present') == 'present'
