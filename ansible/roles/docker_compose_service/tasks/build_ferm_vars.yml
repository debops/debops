# This task file is included via pre_tasks in the playbook to build
# ferm dependent variables before the ferm role runs. The template
# lookup must execute in the docker_compose_service role context to find
# the templates in this role's templates/ directory.

- name: Build ferm dependent variables from Compose service definitions
  ansible.builtin.set_fact:
    docker_compose_service__ferm__dependent_rules: '{{ lookup("template",
                                                        "lookup/docker_compose_service__ferm_rules.j2")
                                                        | from_yaml }}'
