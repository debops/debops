- name: Import DebOps global handlers
  ansible.builtin.import_role:
    name: 'global_handlers'

- name: Import DebOps secret role
  ansible.builtin.import_role:
    name: 'secret'

- name: Install required packages
  ansible.builtin.apt:
    name: '{{ docker_compose_service__python__dependent_packages3 | flatten }}'
    state: 'present'
    install_recommends: False
  register: docker_compose_service__register_packages
  until: docker_compose_service__register_packages is succeeded

- name: Create Compose project directories
  ansible.builtin.file:
    path: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}'
    state: 'directory'
    mode: '0755'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.state | d('present') not in ['absent', 'ignore']
  tags: [ 'role::docker_compose_service:config' ]

- name: Create data directories
  ansible.builtin.file:
    path: '{{ item.1.path }}'
    state: 'directory'
    owner: '{{ item.1.owner | d(omit) }}'
    group: '{{ item.1.group | d(omit) }}'
    mode: '{{ item.1.mode | d("0755") }}'
  loop: '{{ docker_compose_service__combined_services | d([])
            | subelements("data_dirs", skip_missing=True) }}'
  loop_control:
    label: '{{ item.0.name }}: {{ item.1.path }}'
  when: item.0.state | d('present') not in ['absent', 'ignore']
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate docker-compose.yml from template
  ansible.builtin.template:
    src: '{{ item.compose_src
             if (item.compose_src | regex_search("^/"))
             else (docker_compose_service__templates_path + "/by-host/"
                   + inventory_hostname + "/" + item.compose_src) }}'
    dest: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}/docker-compose.yml'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | d('present') not in ['absent', 'ignore']
    - item.compose_src is defined and item.compose_src is truthy
  register: docker_compose_service__register_compose_template
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate docker-compose.yml from inline content
  ansible.builtin.copy:
    content: '{{ item.compose_content }}'
    dest: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}/docker-compose.yml'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | d('present') not in ['absent', 'ignore']
    - item.compose_content is defined and item.compose_content is truthy
    - not (item.compose_src is defined and item.compose_src is truthy)
  register: docker_compose_service__register_compose_content
  tags: [ 'role::docker_compose_service:config' ]

- name: Deploy additional Compose files from templates
  ansible.builtin.template:
    src: '{{ item.1.src
             if (item.1.src | regex_search("^/"))
             else (docker_compose_service__templates_path + "/by-host/"
                   + inventory_hostname + "/" + item.1.src) }}'
    dest: '{{ item.0.compose_dir | d(docker_compose_service__data_path + "/" + item.0.name) }}/{{ item.1.dest | d(item.1.src | basename) }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
  loop: '{{ docker_compose_service__combined_services | d([])
            | subelements("compose_files", skip_missing=True) }}'
  loop_control:
    label: '{{ item.0.name }}: {{ item.1.dest | d(item.1.src | basename) }}'
  when:
    - item.0.state | d('present') not in ['absent', 'ignore']
    - item.1.src is defined and item.1.src is truthy
  register: docker_compose_service__register_compose_files
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate .env file for Compose projects
  ansible.builtin.template:
    src: '{{ item.env_file_src
             if (item.env_file_src | regex_search("^/"))
             else (docker_compose_service__templates_path + "/by-host/"
                   + inventory_hostname + "/" + item.env_file_src) }}'
    dest: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}/.env'
    owner: 'root'
    group: 'root'
    mode: '0600'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | d('present') not in ['absent', 'ignore']
    - item.env_file_src is defined and item.env_file_src is truthy
  register: docker_compose_service__register_env_template
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate .env file from env dictionary
  ansible.builtin.copy:
    content: |
      # Managed by Ansible -- do not edit
      {% for key, value in item.env.items() %}
      {{ key }}={{ value }}
      {% endfor %}
    dest: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}/.env'
    owner: 'root'
    group: 'root'
    mode: '0600'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | d('present') not in ['absent', 'ignore']
    - item.env | d({}) | length > 0
    - not (item.env_file_src is defined and item.env_file_src is truthy)
  register: docker_compose_service__register_env_dict
  tags: [ 'role::docker_compose_service:config' ]

- name: Create directories for config files
  ansible.builtin.file:
    path: '{{ item.1.dest | dirname }}'
    state: 'directory'
    mode: '0755'
  loop: '{{ docker_compose_service__combined_services | d([])
            | subelements("config_files", skip_missing=True) }}'
  loop_control:
    label: '{{ item.0.name }}: {{ item.1.dest }}'
  when: item.0.state | d('present') not in ['absent', 'ignore']
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate config files with inline content
  ansible.builtin.copy:
    content: '{{ item.1.content }}'
    dest: '{{ item.1.dest }}'
    owner: '{{ item.1.owner | d("root") }}'
    group: '{{ item.1.group | d("root") }}'
    mode: '{{ item.1.mode | d("0644") }}'
  loop: '{{ docker_compose_service__combined_services | d([])
            | subelements("config_files", skip_missing=True) }}'
  loop_control:
    label: '{{ item.0.name }}: {{ item.1.dest }}'
  when:
    - item.0.state | d('present') not in ['absent', 'ignore']
    - item.1.content is defined
  register: docker_compose_service__register_config_content
  tags: [ 'role::docker_compose_service:config' ]

- name: Generate config files from templates
  ansible.builtin.template:
    src: '{{ item.1.src
             if (item.1.src | regex_search("^/"))
             else (docker_compose_service__templates_path + "/by-host/"
                   + inventory_hostname + "/" + item.1.src) }}'
    dest: '{{ item.1.dest }}'
    owner: '{{ item.1.owner | d("root") }}'
    group: '{{ item.1.group | d("root") }}'
    mode: '{{ item.1.mode | d("0644") }}'
  loop: '{{ docker_compose_service__combined_services | d([])
            | subelements("config_files", skip_missing=True) }}'
  loop_control:
    label: '{{ item.0.name }}: {{ item.1.dest }}'
  when:
    - item.0.state | d('present') not in ['absent', 'ignore']
    - item.1.src is defined
  register: docker_compose_service__register_config_template
  tags: [ 'role::docker_compose_service:config' ]

- name: Manage config directory trees
  ansible.builtin.include_tasks:
    file: 'manage_config_dir.yml'
  loop: '{{ docker_compose_service__combined_services | d([])
            | selectattr("config_dir", "defined") | list }}'
  loop_control:
    loop_var: 'docker_compose_service__config_dir_service'
    label: '{{ docker_compose_service__config_dir_service.name }}'
  when:
    - docker_compose_service__config_dir_service.state | d('present') not in ['absent', 'ignore']
    - docker_compose_service__config_dir_service.config_dir.src is defined and docker_compose_service__config_dir_service.config_dir.src is truthy
  tags: [ 'role::docker_compose_service:config' ]

- name: Build list of services needing recreation
  ansible.builtin.set_fact:
    docker_compose_service__changed_services: >-
      {{ docker_compose_service__changed_services | d([])
         + [_svc_name] }}
  vars:
    _svc_name: >-
      {{ item.item.name
         if (item.item.name is defined)
         else (item.item.0.name
               if (item.item is sequence and item.item is not string
                   and item.item.0 is defined and item.item.0.name is defined)
               else '') }}
  loop: >-
    {{ (docker_compose_service__register_compose_template.results | d([])
        + docker_compose_service__register_compose_content.results | d([])
        + docker_compose_service__register_compose_files.results | d([])
        + docker_compose_service__register_env_template.results | d([])
        + docker_compose_service__register_env_dict.results | d([])
        + docker_compose_service__register_config_content.results | d([])
        + docker_compose_service__register_config_template.results | d([]))
       | selectattr('changed', 'equalto', true) | list }}
  loop_control:
    label: '{{ _svc_name }}'
  tags: [ 'role::docker_compose_service:compose' ]

- name: Pull Compose project images
  community.docker.docker_compose_v2_pull:
    project_src: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when:
    - item.state | d('present') not in ['absent', 'ignore']
    - item.pull | d(docker_compose_service__pull) | bool
  tags: [ 'role::docker_compose_service:compose' ]

- name: Bring up Compose projects
  community.docker.docker_compose_v2:
    project_src: '{{ item.compose_dir | d(docker_compose_service__data_path + "/" + item.name) }}'
    state: '{{ {"present": "present",
                "stopped": "stopped",
                "absent": "absent"}[item.state | d("present")] }}'
    remove_orphans: '{{ item.remove_orphans | d(True) | bool }}'
    recreate: '{{ "always"
                  if (item.name in (docker_compose_service__changed_services | d([])
                                    + docker_compose_service__restart_services | d([])))
                  else "auto" }}'
  loop: '{{ docker_compose_service__combined_services | d([]) }}'
  loop_control:
    label: '{{ item.name }}'
  when: item.state | d('present') != 'ignore'
  tags: [ 'role::docker_compose_service:compose' ]

- name: Make sure that Ansible local facts directory exists
  ansible.builtin.file:
    path: '/etc/ansible/facts.d'
    state: 'directory'
    mode: '0755'

- name: Save docker_compose_service local facts
  ansible.builtin.template:
    src: 'etc/ansible/facts.d/docker_compose_service.fact.j2'
    dest: '/etc/ansible/facts.d/docker_compose_service.fact'
    mode: '0755'
  notify: [ 'Refresh host facts' ]
  tags: [ 'meta::facts' ]
