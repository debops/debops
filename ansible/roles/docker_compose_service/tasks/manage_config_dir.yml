# Included by main.yml for each service with a 'config_dir' block.
# The outer loop variable is 'docker_compose_service__config_dir_service'.

- name: Resolve config_dir source path
  ansible.builtin.set_fact:
    _docker_compose_service__resolved_config_dir_src: >-
      {{ docker_compose_service__config_dir_service.config_dir.src
         if (docker_compose_service__config_dir_service.config_dir.src | regex_search("^/"))
         else (docker_compose_service__templates_path + "/by-host/"
               + inventory_hostname + "/"
               + docker_compose_service__config_dir_service.config_dir.src) }}

- name: Create base config directory
  ansible.builtin.file:
    path: '{{ docker_compose_service__config_dir_service.config_dir.dest }}'
    state: 'directory'
    mode: '0755'

- name: Create subdirectories from config_dir tree
  ansible.builtin.file:
    path: '{{ docker_compose_service__config_dir_service.config_dir.dest + "/" + item.path }}'
    state: 'directory'
    mode: '{{ item.mode | d("0755") }}'
  with_community.general.filetree:
    - '{{ _docker_compose_service__resolved_config_dir_src }}'
  when: item.state == 'directory'

- name: Generate files from config_dir tree
  ansible.builtin.template:
    src: '{{ item.src }}'
    dest: '{{ docker_compose_service__config_dir_service.config_dir.dest + "/" + item.path }}'
    owner: '{{ docker_compose_service__config_dir_service.config_dir.owner | d("root") }}'
    group: '{{ docker_compose_service__config_dir_service.config_dir.group | d("root") }}'
    mode: '{{ docker_compose_service__config_dir_service.config_dir.mode | d(item.mode | d("0644")) }}'
  with_community.general.filetree:
    - '{{ _docker_compose_service__resolved_config_dir_src }}'
  when: item.state == 'file'
  register: docker_compose_service__register_config_dir

- name: Track services needing restart due to config_dir changes
  ansible.builtin.set_fact:  # noqa no-handler
    docker_compose_service__restart_services: >-
      {{ docker_compose_service__restart_services | d([])
         + [docker_compose_service__config_dir_service.name] }}
  when: docker_compose_service__register_config_dir is changed
